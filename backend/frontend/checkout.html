<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout — Loja</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">🛍️ Loja</a>
    <div class="nav-links">
      <a href="index.html">Início</a>
      <a href="carrinho.html" class="cart-link">
        🛒 Carrinho <span class="cart-count">0</span>
      </a>
    </div>
  </div>
</nav>

<div class="container">
  <div class="page-header">
    <h1>Finalizar Compra</h1>
    <p><a href="carrinho.html" style="color:var(--primary);text-decoration:none">← Voltar ao carrinho</a></p>
  </div>

  <div class="checkout-layout">
    <div>
      <form id="form-checkout">
        <div class="form-card">
          <h2>Dados Pessoais</h2>
          <div class="form-row">
            <div class="form-group">
              <label for="nome">Nome completo</label>
              <input type="text" id="nome" placeholder="João Silva" required>
            </div>
            <div class="form-group">
              <label for="email">E-mail</label>
              <input type="email" id="email" placeholder="joao@email.com" required>
            </div>
          </div>
          <div class="form-group">
            <label for="telefone">Telefone</label>
            <input type="tel" id="telefone" placeholder="(11) 99999-9999">
          </div>
        </div>

        <div class="form-card" style="margin-top:1.5rem">
          <h2>Endereço de Entrega</h2>
          <div class="form-row">
            <div class="form-group">
              <label for="cep">CEP</label>
              <input type="text" id="cep" placeholder="00000-000" required>
            </div>
            <div class="form-group">
              <label for="numero">Número</label>
              <input type="text" id="numero" placeholder="123" required>
            </div>
          </div>
          <div class="form-group">
            <label for="rua">Rua / Logradouro</label>
            <input type="text" id="rua" placeholder="Rua das Flores" required>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="cidade">Cidade</label>
              <input type="text" id="cidade" placeholder="São Paulo" required>
            </div>
            <div class="form-group">
              <label for="estado">Estado</label>
              <select id="estado" required>
                <option value="">Selecione...</option>
                <option>AC</option><option>AL</option><option>AP</option><option>AM</option>
                <option>BA</option><option>CE</option><option>DF</option><option>ES</option>
                <option>GO</option><option>MA</option><option>MT</option><option>MS</option>
                <option>MG</option><option>PA</option><option>PB</option><option>PR</option>
                <option>PE</option><option>PI</option><option>RJ</option><option>RN</option>
                <option>RS</option><option>RO</option><option>RR</option><option>SC</option>
                <option selected>SP</option><option>SE</option><option>TO</option>
              </select>
            </div>
          </div>
        </div>

        <div class="form-card" style="margin-top:1.5rem">
          <h2>Pagamento</h2>
          <div class="form-group">
            <label for="pagamento">Forma de pagamento</label>
            <select id="pagamento" required>
              <option value="">Selecione...</option>
              <option>Cartão de Crédito</option>
              <option>Cartão de Débito</option>
              <option>Pix</option>
              <option>Boleto Bancário</option>
            </select>
          </div>
          <p style="font-size:0.85rem;color:var(--text-muted);margin-top:0.5rem">
            🔒 Pagamento seguro — seus dados estão protegidos
          </p>
        </div>

        <button type="submit" id="btn-finalizar" class="btn btn-success btn-lg btn-full" style="margin-top:1.5rem">
          Finalizar Pedido →
        </button>
      </form>
    </div>

    <div class="resumo-card">
      <h3>Resumo do Pedido</h3>
      <div id="resumo-lista"></div>
      <div class="resumo-total">
        <span>Total</span>
        <span id="resumo-total">R$ 0,00</span>
      </div>
    </div>
  </div>
</div>

<script src="js/carrinho.js"></script>
<script src="js/api.js"></script>
<script src="js/checkout.js"></script>
</body>
</html>
