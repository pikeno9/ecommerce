<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Produto — Loja</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">🛍️ Loja</a>
    <div class="nav-links">
      <a href="index.html">Início</a>
      <a href="carrinho.html" class="cart-link">
        🛒 Carrinho <span class="cart-count">0</span>
      </a>
    </div>
  </div>
</nav>

<div class="container">
  <p style="margin-bottom:1.5rem"><a href="index.html" style="color:var(--primary);text-decoration:none">← Voltar à loja</a></p>

  <div id="produto-container" class="produto-detalhe">
    <div class="skeleton" style="height:400px;border-radius:12px"></div>
    <div style="display:flex;flex-direction:column;gap:1rem">
      <div class="skeleton" style="height:24px;width:100px"></div>
      <div class="skeleton" style="height:40px;width:80%"></div>
      <div class="skeleton" style="height:32px;width:120px"></div>
      <div class="skeleton" style="height:80px"></div>
    </div>
  </div>
</div>

<script src="js/carrinho.js"></script>
<script src="js/api.js"></script>
<script>
// Substituir conteúdo após carregar
async function init() {
  const id = new URLSearchParams(location.search).get('id');
  if (!id) { location.href = 'index.html'; return; }
  let qty = 1;
  let produto = null;

  try {
    const res = await fetch(`http://localhost:3000/api/produtos/${id}`);
    produto = await res.json();
    document.title = `${produto.nome} — Loja`;

    document.getElementById('produto-container').innerHTML = `
      <img src="${produto.imagem}" alt="${produto.nome}" style="width:100%;border-radius:12px;box-shadow:var(--shadow)">
      <div class="produto-info">
        <span class="produto-categoria">${produto.categoria}</span>
        <h1 class="produto-nome">${produto.nome}</h1>
        <div class="produto-preco">R$ ${produto.preco.toFixed(2).replace('.', ',')}</div>
        <p class="produto-desc">${produto.descricao}</p>
        <div class="estoque-badge">✓ ${produto.estoque} em estoque</div>
        <div class="qty-control">
          <button onclick="changeQty(-1)">−</button>
          <span id="qty-valor">1</span>
          <button onclick="changeQty(1)">+</button>
        </div>
        <button class="btn btn-primary btn-lg btn-full" onclick="adicionarAoCarrinho()">
          🛒 Adicionar ao Carrinho
        </button>
        <a href="carrinho.html" class="btn btn-outline btn-full">Ver Carrinho</a>
      </div>
    `;

    window.changeQty = (delta) => {
      qty = Math.max(1, qty + delta);
      document.getElementById('qty-valor').textContent = qty;
    };

    window.adicionarAoCarrinho = () => {
      Carrinho.add(produto, qty);
      showToast(`✓ ${qty}x ${produto.nome} adicionado!`, 'success');
    };
  } catch {
    document.getElementById('produto-container').innerHTML =
      '<p style="color:red">Erro ao carregar produto. Verifique se o servidor está rodando.</p>';
  }
}
init();
</script>
</body>
</html>
